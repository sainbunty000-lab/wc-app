version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: wc_app_mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: financial_analytics
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wc_app_network

  backend:
    build:
      context: ./wc-app-main/backend
      dockerfile: Dockerfile
    container_name: wc_app_backend
    ports:
      - "8001:8001"
    environment:
      MONGO_URL: mongodb://mongodb:27017
      DB_NAME: financial_analytics
      LOG_LEVEL: INFO
      PORT: 8001
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./wc-app-main/backend:/app
    networks:
      - wc_app_network
    command: uvicorn server:app --host 0.0.0.0 --port 8001 --reload

volumes:
  mongodb_data:
  mongodb_config:

networks:
  wc_app_network:
    driver: bridge
